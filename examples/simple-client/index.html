<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelayMesh Simple Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .status-item {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .status-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .status-value.relay {
            color: #667eea;
        }

        .status-value.regular {
            color: #48bb78;
        }

        .videos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .video-label {
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .local-video {
            border: 3px solid #667eea;
        }

        .local-video video {
            transform: scaleX(-1); /* Mirror the video horizontally */
        }

        .log {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 3px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .log-entry.info {
            background: #e6f7ff;
            color: #0066cc;
        }

        .log-entry.success {
            background: #f0fff4;
            color: #22543d;
        }

        .log-entry.error {
            background: #fff5f5;
            color: #c53030;
        }

        .log-entry.warning {
            background: #fffaf0;
            color: #c05621;
        }

        .audio-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .audio-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .audio-level {
            width: 100px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid #ccc;
        }

        .audio-level-bar {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            transition: width 0.05s ease-out;
            border-radius: 10px;
            min-width: 2px;
        }

        .remote-audio {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            margin-top: 10px;
        }

        .remote-audio audio {
            flex: 1;
        }

        .mute-btn {
            padding: 8px 16px;
            background: #48bb78;
            font-size: 12px;
        }

        .mute-btn.muted {
            background: #e53e3e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 RelayMesh Simple Client</h1>
            <div class="controls">
                <input type="text" id="serverUrl" placeholder="Signaling Server URL" value="ws://localhost:8080">
                <input type="text" id="userName" placeholder="Your Name" value="User">
                <input type="text" id="conferenceId" placeholder="Conference ID" value="demo-conference">
                <button id="joinBtn">Join Conference</button>
                <button id="leaveBtn" disabled>Leave Conference</button>
            </div>
            <div class="audio-controls">
                <button id="muteBtn" class="mute-btn" disabled>🎤 Mute</button>
                <div class="audio-indicator">
                    <span>Your Audio:</span>
                    <div class="audio-level">
                        <div class="audio-level-bar" id="localAudioLevel"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status">
            <h2>Status</h2>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-label">State</div>
                    <div class="status-value" id="state">IDLE</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Role</div>
                    <div class="status-value" id="role">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Participant ID</div>
                    <div class="status-value" id="participantId">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Participants</div>
                    <div class="status-value" id="participantCount">0</div>
                </div>
            </div>
        </div>

        <div class="videos" id="videos"></div>

        <div class="status">
            <h2>Remote Audio Streams</h2>
            <div id="remoteAudioStreams"></div>
        </div>

        <div class="log">
            <h2>Event Log</h2>
            <div id="logEntries"></div>
        </div>
    </div>

    <script type="module">
        // Using the ES module browser bundle (with cache buster)
        import { RelayMeshClient } from '../../dist/browser/relay-mesh.esm.js?v=22';

        console.log('[Simple Client] Version 1.2.4 - Join muted by default');
        console.log('[Simple Client] Checking for getLocalStream method...');
        
        // Generate random username on page load
        const adjectives = ['Happy', 'Clever', 'Brave', 'Swift', 'Bright', 'Cool', 'Smart', 'Quick', 'Bold', 'Wise'];
        const nouns = ['Panda', 'Tiger', 'Eagle', 'Dolphin', 'Fox', 'Wolf', 'Bear', 'Hawk', 'Lion', 'Owl'];
        const randomAdjective = adjectives[Math.floor(Math.random() * adjectives.length)];
        const randomNoun = nouns[Math.floor(Math.random() * nouns.length)];
        const randomNumber = Math.floor(Math.random() * 100);
        const randomUsername = `${randomAdjective}${randomNoun}${randomNumber}`;
        document.getElementById('userName').value = randomUsername;
        
        // Verify the method exists
        const testClient = new RelayMeshClient({
            signalingServerUrl: 'ws://test',
            participantName: 'test',
            enforceSecureConnection: false
        });
        
        if (typeof testClient.getLocalStream === 'function') {
            console.log('[Simple Client] ✅ getLocalStream method is available');
        } else {
            console.error('[Simple Client] ❌ getLocalStream method is NOT available - old bundle cached!');
            console.error('[Simple Client] Please hard refresh: Ctrl+Shift+R (Windows) or Cmd+Shift+R (Mac)');
        }

        let client = null;
        let localStream = null;
        let audioContext = null;
        let localAnalyser = null;
        let isMuted = false;
        let remoteAudioElements = new Map();
        let remoteVideoElements = new Map(); // Track video elements by participant ID
        let processedStreams = new Map(); // Track which streams we've already processed
        let participantNames = new Map(); // Track participant names by ID
        
        // Expose for debugging
        window.debugAudio = {
            getClient: () => client,
            getLocalStream: () => localStream,
            getAudioContext: () => audioContext,
            getLocalAnalyser: () => localAnalyser,
            getElements: () => elements,
            getIsMuted: () => isMuted
        };

        const elements = {
            serverUrl: document.getElementById('serverUrl'),
            userName: document.getElementById('userName'),
            conferenceId: document.getElementById('conferenceId'),
            joinBtn: document.getElementById('joinBtn'),
            leaveBtn: document.getElementById('leaveBtn'),
            state: document.getElementById('state'),
            role: document.getElementById('role'),
            participantId: document.getElementById('participantId'),
            participantCount: document.getElementById('participantCount'),
            videos: document.getElementById('videos'),
            logEntries: document.getElementById('logEntries'),
            muteBtn: document.getElementById('muteBtn'),
            localAudioLevel: document.getElementById('localAudioLevel'),
            remoteAudioStreams: document.getElementById('remoteAudioStreams')
        };

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            elements.logEntries.insertBefore(entry, elements.logEntries.firstChild);
        }

        function updateStatus(info) {
            console.log('[updateStatus] called with:', info);
            if (info) {
                elements.participantId.textContent = info.participantId || '-';
                elements.participantCount.textContent = info.participantCount || 0;
                elements.role.textContent = info.role ? info.role.toUpperCase() : '-';
                elements.role.className = `status-value ${info.role || ''}`;
                console.log('[updateStatus] Updated DOM - count:', info.participantCount);
            }
        }

        function refreshStatus() {
            if (client) {
                const info = client.getConferenceInfo();
                console.log('[Debug] getConferenceInfo returned:', info);
                updateStatus(info);
                
                // Debug: Log metrics count
                const metricsCount = client['allMetrics'] ? client['allMetrics'].size : 0;
                console.log('[Debug] allMetrics.size:', metricsCount, 'participantCount:', info?.participantCount);
            }
        }

        function addVideoElement(stream, participantId, label, isLocal = false) {
            // Check if video element already exists for this participant
            if (!isLocal && remoteVideoElements.has(participantId)) {
                log(`Video element already exists for ${participantId}`, 'info');
                return remoteVideoElements.get(participantId);
            }
            
            const container = document.createElement('div');
            container.className = `video-container ${isLocal ? 'local-video' : ''}`;
            container.id = `video-${participantId}`;

            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            if (isLocal) video.muted = true;

            const labelDiv = document.createElement('div');
            labelDiv.className = 'video-label';
            labelDiv.textContent = label;

            container.appendChild(video);
            container.appendChild(labelDiv);
            
            // Insert local video at the beginning, remote videos at the end
            if (isLocal) {
                elements.videos.insertBefore(container, elements.videos.firstChild);
            } else {
                elements.videos.appendChild(container);
            }

            // Track remote video elements with label reference
            if (!isLocal) {
                remoteVideoElements.set(participantId, { container, video, label: labelDiv });
            }

            return container;
        }

        function removeVideoElement(participantId) {
            const element = remoteVideoElements.get(participantId);
            if (element) {
                element.video.srcObject = null;
                element.container.remove();
                remoteVideoElements.delete(participantId);
            }
        }

        function getParticipantDisplayName(participantId) {
            const name = participantNames.get(participantId);
            return name || participantId.substring(0, 20) + '...';
        }

        function updateParticipantLabel(participantId) {
            const displayName = getParticipantDisplayName(participantId);
            console.log('[updateParticipantLabel] Updating labels for:', participantId, 'to:', displayName);
            
            // Update audio label
            const audioElement = remoteAudioElements.get(participantId);
            if (audioElement && audioElement.label) {
                console.log('[updateParticipantLabel] Updating audio label');
                audioElement.label.textContent = `🔊 ${displayName}`;
            }
            
            // Update video label
            const videoElement = remoteVideoElements.get(participantId);
            if (videoElement && videoElement.label) {
                console.log('[updateParticipantLabel] Updating video label');
                videoElement.label.textContent = displayName;
            }
        }

        function setupAudioAnalyser(stream) {
            try {
                log('Setting up audio analyser...', 'info');
                
                // Check if stream has audio tracks
                const audioTracks = stream.getAudioTracks();
                if (audioTracks.length === 0) {
                    log('No audio tracks in stream', 'warning');
                    return;
                }
                
                log(`Audio track: ${audioTracks[0].label}, enabled: ${audioTracks[0].enabled}`, 'info');
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                log(`Audio context created, state: ${audioContext.state}`, 'info');
                
                // Resume audio context if suspended (browser autoplay policy)
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        log(`Audio context resumed, state: ${audioContext.state}`, 'success');
                    });
                }
                
                const source = audioContext.createMediaStreamSource(stream);
                localAnalyser = audioContext.createAnalyser();
                localAnalyser.fftSize = 2048;
                localAnalyser.smoothingTimeConstant = 0.8;
                source.connect(localAnalyser);

                // Start monitoring audio levels
                const dataArray = new Uint8Array(localAnalyser.fftSize);
                let lastLoggedRms = -1;
                const rmsChangeThreshold = 0.01; // Only log if RMS changes by more than 1%
                
                function updateAudioLevel() {
                    if (!localAnalyser) return;
                    
                    // Use time domain data for better amplitude detection
                    localAnalyser.getByteTimeDomainData(dataArray);
                    
                    // Calculate RMS (Root Mean Square) for better volume representation
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const normalized = (dataArray[i] - 128) / 128; // Normalize to -1 to 1
                        sum += normalized * normalized;
                    }
                    const rms = Math.sqrt(sum / dataArray.length);
                    
                    // Convert to percentage (amplify for better visibility)
                    const percentage = Math.min(100, rms * 300);
                    
                    elements.localAudioLevel.style.width = `${percentage}%`;
                    
                    // Only log when RMS value changes significantly
                    if (Math.abs(rms - lastLoggedRms) > rmsChangeThreshold) {
                        console.log(`[Audio Level] RMS: ${rms.toFixed(4)}, Percentage: ${percentage.toFixed(1)}%, Context: ${audioContext?.state}`);
                        lastLoggedRms = rms;
                    }
                    
                    if (client && client.getCurrentState() === 'connected') {
                        requestAnimationFrame(updateAudioLevel);
                    } else {
                        console.log('[Audio Level] Loop stopped, client state:', client?.getCurrentState());
                    }
                }
                
                updateAudioLevel();
                log('Audio monitoring started', 'success');
            } catch (error) {
                log(`Audio monitoring failed: ${error.message}`, 'error');
                console.error('Audio analyser error:', error);
            }
        }

        function addRemoteAudioElement(stream, participantId) {
            const container = document.createElement('div');
            container.className = 'remote-audio';
            container.id = `audio-${participantId}`;

            const label = document.createElement('span');
            label.textContent = `🔊 ${getParticipantDisplayName(participantId)}`;

            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.controls = true;
            
            // Set default volume
            audio.volume = 0.8;

            container.appendChild(label);
            container.appendChild(audio);
            elements.remoteAudioStreams.appendChild(container);

            remoteAudioElements.set(participantId, { container, audio, label });
            
            log(`Playing audio from: ${getParticipantDisplayName(participantId)}`, 'success');
        }

        function removeRemoteAudioElement(participantId) {
            const element = remoteAudioElements.get(participantId);
            if (element) {
                element.audio.srcObject = null;
                element.container.remove();
                remoteAudioElements.delete(participantId);
            }
        }

        elements.muteBtn.addEventListener('click', () => {
            if (!localStream) return;

            // Resume audio context if suspended (helps with browser autoplay policy)
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                    log('Audio context resumed', 'info');
                });
            }

            const audioTracks = localStream.getAudioTracks();
            isMuted = !isMuted;

            audioTracks.forEach(track => {
                track.enabled = !isMuted;
            });

            elements.muteBtn.textContent = isMuted ? '🔇 Unmute' : '🎤 Mute';
            elements.muteBtn.classList.toggle('muted', isMuted);
            
            log(isMuted ? 'Microphone muted' : 'Microphone unmuted', 'info');
        });

        elements.joinBtn.addEventListener('click', async () => {
            try {
                elements.joinBtn.disabled = true;
                log('Creating client...', 'info');

                // Check if media devices are available
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('WebRTC is not supported in this browser');
                }

                client = new RelayMeshClient({
                    signalingServerUrl: elements.serverUrl.value,
                    participantName: elements.userName.value,
                    enforceSecureConnection: false
                });

                // Setup event handlers
                client.on('stateChange', (event) => {
                    elements.state.textContent = event.to;
                    log(`State changed: ${event.from} → ${event.to}`, 'info');
                    refreshStatus();
                });

                client.on('roleChange', (role) => {
                    elements.role.textContent = role.toUpperCase();
                    elements.role.className = `status-value ${role}`;
                    log(`Role changed to: ${role}`, role === 'relay' ? 'warning' : 'info');
                    refreshStatus();
                });

                client.on('remoteStream', (stream) => {
                    // Check if we've already processed this stream
                    const streamKey = `${stream.participantId}-${stream.streamId}`;
                    if (processedStreams.has(streamKey)) {
                        console.log('[Remote Stream] Already processed stream:', streamKey);
                        return;
                    }
                    
                    processedStreams.set(streamKey, true);
                    
                    console.log('[Remote Stream] Processing stream from:', stream.participantId);
                    console.log('[Remote Stream] Current participant names:', Array.from(participantNames.entries()));
                    console.log('[Remote Stream] Display name will be:', getParticipantDisplayName(stream.participantId));
                    
                    log(`Received remote stream: ${stream.streamId}`, 'success');
                    console.log('[Remote Stream] Full stream object:', stream);
                    console.log('[Remote Stream] Participant ID:', stream.participantId);
                    console.log('[Remote Stream] Tracks:', stream.tracks);
                    
                    // Filter tracks by kind
                    const audioTracks = stream.tracks.filter(t => t.kind === 'audio');
                    const videoTracks = stream.tracks.filter(t => t.kind === 'video');
                    
                    console.log('[Remote Stream] Audio tracks:', audioTracks.length);
                    console.log('[Remote Stream] Video tracks:', videoTracks.length);
                    
                    // Create a browser MediaStream from the tracks for playback
                    const browserStream = new MediaStream(stream.tracks);
                    
                    // Add video element ONLY if stream has video tracks
                    if (videoTracks.length > 0 && !remoteVideoElements.has(stream.participantId)) {
                        addVideoElement(browserStream, stream.participantId, getParticipantDisplayName(stream.participantId), false);
                        log(`Added video element for ${getParticipantDisplayName(stream.participantId)}`, 'info');
                    }
                    
                    // Add audio element if stream has audio tracks
                    if (audioTracks.length > 0) {
                        // Check if audio element already exists for this participant
                        if (!remoteAudioElements.has(stream.participantId)) {
                            log(`Adding audio element for participant ${stream.participantId}`, 'info');
                            addRemoteAudioElement(browserStream, stream.participantId);
                        } else {
                            log(`Audio element already exists for ${stream.participantId}`, 'info');
                        }
                    } else {
                        log(`No audio tracks in remote stream ${stream.streamId}`, 'warning');
                    }
                    
                    if (audioTracks.length === 0 && videoTracks.length === 0) {
                        log(`Warning: Stream ${stream.streamId} has no tracks`, 'warning');
                    }
                });

                client.on('topologyUpdate', (topology) => {
                    log(`Topology updated: ${topology.relayNodes.length} relays`, 'info');
                    refreshStatus();
                });

                client.on('participantJoined', (data) => {
                    const { participantId, participantName } = data;
                    console.log('[participantJoined] Received:', { participantId, participantName });
                    log(`Participant joined: ${participantName || participantId.substring(0, 20)}`, 'info');
                    
                    // Store participant name
                    if (participantName) {
                        participantNames.set(participantId, participantName);
                        console.log('[participantJoined] Stored name:', participantId, '->', participantName);
                        console.log('[participantJoined] All names:', Array.from(participantNames.entries()));
                        // Update labels if elements already exist
                        updateParticipantLabel(participantId);
                    }
                    
                    refreshStatus();
                });

                client.on('participantLeft', (participantId) => {
                    const displayName = getParticipantDisplayName(participantId);
                    log(`Participant left: ${displayName}`, 'warning');
                    removeRemoteAudioElement(participantId);
                    removeVideoElement(participantId);
                    
                    // Clean up participant name
                    participantNames.delete(participantId);
                    
                    // Clean up processed streams for this participant
                    for (const [key, _] of processedStreams) {
                        if (key.startsWith(participantId)) {
                            processedStreams.delete(key);
                        }
                    }
                    
                    refreshStatus();
                });

                // Debug: Monitor all client events
                const originalEmit = client.emit.bind(client);
                client.emit = function(event, ...args) {
                    console.log('[Event]', event, args);
                    if (event === 'topologyUpdate') {
                        // Refresh status when topology updates
                        setTimeout(refreshStatus, 100);
                    }
                    return originalEmit(event, ...args);
                };
                
                // Debug: Monitor metrics collection
                if (client['metricsCollector']) {
                    const mc = client['metricsCollector'];
                    const originalNotify = mc['notifySubscribers'].bind(mc);
                    mc['notifySubscribers'] = function() {
                        console.log('[MetricsCollector] Notifying subscribers, metrics:', mc['currentMetrics']);
                        return originalNotify();
                    };
                }
                
                log('Joining conference...', 'info');
                
                // Debug: Monitor metrics broadcasts
                let metricsReceived = 0;
                const checkMetrics = setInterval(() => {
                    const count = client['allMetrics'] ? client['allMetrics'].size : 0;
                    if (count !== metricsReceived) {
                        metricsReceived = count;
                        log(`Metrics received from ${count} participant(s)`, 'info');
                        console.log('[Debug] allMetrics:', Array.from(client['allMetrics'].keys()));
                        // Trigger UI refresh when metrics count changes
                        refreshStatus();
                    }
                }, 500);
                
                const info = await client.joinConference(elements.conferenceId.value);
                
                // Store our own participant name
                participantNames.set(info.participantId, elements.userName.value);
                
                console.log('[DEBUG] Join completed, getting local stream...');
                
                // Get local stream and setup audio monitoring
                log('Getting local stream...', 'info');
                localStream = client.getLocalStream();
                
                console.log('[DEBUG] getLocalStream returned:', localStream);
                
                if (localStream) {
                    log(`Local stream ID: ${localStream.id}, active: ${localStream.active}`, 'info');
                    
                    const audioTracks = localStream.getAudioTracks();
                    const videoTracks = localStream.getVideoTracks();
                    
                    log(`Local media: ${audioTracks.length} audio, ${videoTracks.length} video tracks`, 'info');
                    
                    // Add local video preview if video tracks exist
                    if (videoTracks.length > 0) {
                        const userName = elements.userName.value || 'You';
                        addVideoElement(localStream, 'local', `${userName} (You)`, true);
                        log('Local video preview added', 'info');
                    }
                    
                    if (audioTracks.length > 0) {
                        // Mute by default when joining
                        isMuted = true;
                        audioTracks.forEach(track => {
                            track.enabled = false;
                        });
                        elements.muteBtn.textContent = '🔇 Unmute';
                        
                        log(`Audio track: ${audioTracks[0].label}, muted by default`, 'info');
                        log('You joined muted. Click Unmute to speak.', 'info');
                        setupAudioAnalyser(localStream);
                        elements.muteBtn.disabled = false;
                    } else {
                        log('No audio tracks available for monitoring', 'warning');
                    }
                } else {
                    log('Warning: No local stream available', 'warning');
                }
                
                log(`Joined conference successfully!`, 'success');
                log('Collecting metrics... participant count will update in 3-5 seconds', 'info');
                
                // Initial status update
                refreshStatus();
                
                // Set up periodic status refresh to catch metrics updates
                const statusInterval = setInterval(() => {
                    if (client && client.getCurrentState() === 'CONNECTED') {
                        refreshStatus();
                    } else {
                        clearInterval(statusInterval);
                    }
                }, 1000);
                
                elements.joinBtn.disabled = true;
                elements.leaveBtn.disabled = false;

            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                
                // Provide helpful error messages
                if (error.message.includes('Requested device not found')) {
                    log('No camera/microphone found. Please connect a device and try again.', 'warning');
                } else if (error.message.includes('Permission denied')) {
                    log('Camera/microphone access denied. Please allow permissions and reload.', 'warning');
                } else if (error.message.includes('device in use')) {
                    log('Camera/microphone is being used by another application.', 'warning');
                }
                
                elements.joinBtn.disabled = false;
                
                // Clean up client if it was created
                if (client) {
                    try {
                        await client.leaveConference();
                    } catch (e) {
                        // Ignore cleanup errors
                    }
                    client = null;
                }
            }
        });

        elements.leaveBtn.addEventListener('click', async () => {
            try {
                elements.leaveBtn.disabled = true;
                log('Leaving conference...', 'info');
                
                await client.leaveConference();
                
                // Clean up audio context
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                    localAnalyser = null;
                }
                
                // Clear videos and audio
                elements.videos.innerHTML = '';
                elements.remoteAudioStreams.innerHTML = '';
                remoteAudioElements.clear();
                remoteVideoElements.clear();
                processedStreams.clear();
                participantNames.clear();
                
                // Reset audio controls
                elements.muteBtn.disabled = true;
                elements.muteBtn.textContent = '🎤 Mute';
                elements.muteBtn.classList.remove('muted');
                elements.localAudioLevel.style.width = '0%';
                isMuted = false;
                localStream = null;
                
                // Reset status
                elements.state.textContent = 'IDLE';
                elements.role.textContent = '-';
                elements.participantId.textContent = '-';
                elements.participantCount.textContent = '0';
                
                log('Left conference', 'success');
                elements.joinBtn.disabled = false;
                
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                elements.leaveBtn.disabled = false;
            }
        });

        log('Ready to join conference', 'success');

        // Check for media devices on load
        (async () => {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    log('WebRTC not supported in this browser', 'error');
                    elements.joinBtn.disabled = true;
                    return;
                }

                const devices = await navigator.mediaDevices.enumerateDevices();
                const hasVideo = devices.some(d => d.kind === 'videoinput');
                const hasAudio = devices.some(d => d.kind === 'audioinput');

                if (!hasVideo && !hasAudio) {
                    log('No camera or microphone detected', 'warning');
                    log('You can still join but won\'t be able to share media', 'info');
                } else if (!hasVideo) {
                    log('No camera detected - audio only mode', 'warning');
                } else if (!hasAudio) {
                    log('No microphone detected - video only mode', 'warning');
                } else {
                    log(`Detected ${devices.filter(d => d.kind === 'videoinput').length} camera(s) and ${devices.filter(d => d.kind === 'audioinput').length} microphone(s)`, 'info');
                }
            } catch (error) {
                log('Could not check media devices', 'warning');
            }
        })();
    </script>
</body>
</html>
